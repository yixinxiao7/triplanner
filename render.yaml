# render.yaml — Render Blueprint for TripPlanner
#
# Defines two services deployed on Render (free tier, Ohio region):
#   1. triplanner-backend  — Node.js web service
#   2. triplanner-frontend — React static site
#
# Database: AWS RDS PostgreSQL 15 (external — configured via DATABASE_URL env var)
#
# Usage:
#   1. Push this file to the repo root.
#   2. In Render Dashboard → Blueprints → "New Blueprint Instance" → connect repo.
#   3. Set all `sync: false` env vars manually in the Render dashboard.
#      See docs/production-deploy-guide.md for full setup instructions.
#
# IMPORTANT — No secrets are hardcoded in this file.
# All sensitive values (DATABASE_URL, JWT_SECRET) are either:
#   - generateValue: true  (Render auto-generates a secure random value), or
#   - sync: false          (must be set manually in Render dashboard)

services:
  # ─────────────────────────────────────────────
  # Backend — Express API
  # ─────────────────────────────────────────────
  - type: web
    name: triplanner-backend
    runtime: node
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/v1/health
    envVars:
      # Runtime environment — must be production for SameSite=None cookie fix (T-221)
      - key: NODE_ENV
        value: production

      # AWS RDS connection string — set manually in Render dashboard after RDS is provisioned
      # Format: postgres://USERNAME:PASSWORD@RDS_ENDPOINT:5432/DATABASE_NAME?sslmode=require
      - key: DATABASE_URL
        sync: false

      # JWT signing secret — Render generates a cryptographically secure random value
      - key: JWT_SECRET
        generateValue: true

      # Token expiry config
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      # CORS allowed origin — set to the production frontend URL
      # Production: https://triplanner.yixinx.com
      - key: CORS_ORIGIN
        sync: false

      # Port — Render injects PORT automatically; this is a fallback
      - key: PORT
        value: '10000'

      # ─── Google OAuth: Sign-In + Calendar export (T-343) ───
      # From the OAuth 2.0 Client (Web application) in Google Cloud Console.
      # BOTH callback URLs must be added as Authorized redirect URIs on that
      # client, and the Google Calendar API must be enabled in the project.
      # If unset, Sign-In degrades to ?error=oauth_unavailable and Calendar
      # export returns 503 GOOGLE_CALENDAR_UNAVAILABLE (rest of the app works).
      #
      # Callback URLs use the SAME-ORIGIN domain (triplanner.yixinx.com), not
      # the onrender.com URL. A Cloudflare Worker routes /api/* on that domain
      # to this backend, so auth cookies are first-party — required for iOS /
      # Safari, which block third-party cookies (bug-046). See deploy guide
      # Step 8. Both URLs must also be Authorized redirect URIs on the OAuth
      # client.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Production value: https://triplanner.yixinx.com/api/v1/auth/google/callback
      - key: GOOGLE_CALLBACK_URL
        sync: false
      # Production value: https://triplanner.yixinx.com/api/v1/auth/google/calendar/callback
      - key: GOOGLE_CALENDAR_CALLBACK_URL
        sync: false
      # Browser redirect target after OAuth callbacks (falls back to CORS_ORIGIN).
      # Production value: https://triplanner.yixinx.com
      - key: FRONTEND_URL
        sync: false

      # ─── Gemini — AI PDF itinerary import (T-332) ───
      # Get a key at https://aistudio.google.com/apikey. If unset, PDF import
      # fails with 502 EXTERNAL_SERVICE_ERROR (bug-045); rest of the app works.
      - key: GEMINI_API_KEY
        sync: false


  # ─────────────────────────────────────────────
  # Frontend — React SPA (Static Site)
  # ─────────────────────────────────────────────
  - type: web
    name: triplanner-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    # React Router SPA — serve index.html for all routes
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Backend API base URL — baked into the Vite bundle at build time.
      # Note: VITE_ prefix is required for Vite to expose this to client-side code.
      #
      # MUST stay same-origin: the relative path "/api/v1" (production) so the
      # SPA calls its own origin (triplanner.yixinx.com), where a Cloudflare
      # Worker proxies /api/* to the backend. A cross-site value like the
      # onrender.com URL makes the refresh-token cookie third-party, which
      # iOS/Safari (WebKit ITP) block — login then fails to persist (bug-046).
      # Set manually in the dashboard; sync:false so a Blueprint sync can never
      # revert it to a cross-site URL. See deploy guide Step 8.
      - key: VITE_API_URL
        sync: false
